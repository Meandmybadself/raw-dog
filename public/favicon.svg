  <!-- Eyes -->
  <circle cx="23" cy="28" r="4" fill="#3D2B1F"/>
  <circle cx="41" cy="28" r="4" fill="#3D2B1F"/>
  <circle cx="24" cy="27" r="1.5" fill="white"/>
  <circle cx="42" cy="27" r="1.5" fill="white"/>
  <!-- Mouth -->
  <path d="M28 42 Q32 46 36 42" stroke="#3D2B1F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="32" y2="43" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="34" cy="45" rx="3" ry="4" fill="#E8828A"/>
