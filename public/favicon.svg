<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ears -->
  <ellipse cx="16" cy="14" rx="12" ry="16" fill="#8B5E3C" transform="rotate(-15 16 14)"/>
  <ellipse cx="48" cy="14" rx="12" ry="16" fill="#8B5E3C" transform="rotate(15 48 14)"/>
  <ellipse cx="16" cy="14" rx="8" ry="11" fill="#D4956B" transform="rotate(-15 16 14)"/>
  <ellipse cx="48" cy="14" rx="8" ry="11" fill="#D4956B" transform="rotate(15 48 14)"/>
  <!-- Head -->
  <circle cx="32" cy="32" r="22" fill="#A0714F"/>
  <!-- Snout -->
  <ellipse cx="32" cy="40" rx="14" ry="10" fill="#D4956B"/>
  <!-- Nose -->
  <ellipse cx="32" cy="37" rx="5" ry="3.5" fill="#3D2B1F"/>
